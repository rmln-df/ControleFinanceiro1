<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTROLE FINANCEIRO</title>

<!-- ✅ FALLBACK CHART.JS (SEM TELA BRANCA) -->
<script>
window.chartReady = false;

(function(){
  var s = document.createElement("script");
  s.src = "chart.js";

  s.onload = function(){
    window.chartReady = true;
  };

  s.onerror = function(){
    var cdn = document.createElement("script");
    cdn.src = "https://cdn.jsdelivr.net/npm/chart.js";
    cdn.onload = function(){
      window.chartReady = true;
    };
    document.head.appendChild(cdn);
  };

  document.head.appendChild(s);
})();
</script>

<style>
/* SPLASH */
#splash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#3498db,#2c3e50);
z-index:9999;
}
.splash-box{text-align:center;color:#fff}
.logo{font-size:50px;animation:pulse 1.5s infinite}
.barra{width:200px;height:6px;background:rgba(255,255,255,0.3);margin:20px auto;border-radius:10px;overflow:hidden}
.barra::after{content:"";display:block;height:100%;width:0;background:#fff;animation:carregar 2.5s linear forwards}
@keyframes carregar{from{width:0}to{width:100%}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.fade-out{opacity:0;transition:.8s}

.menu button {font-size:20px;width:40px;height:40px;border-radius:100%;background:var(--primary);color:#fff;border:none;margin:5px}
.fab {font-size:50px;width:70px;height:70px;}
#filtroMes {font-size:25px;padding:20px;width:300px;height:10px;border-radius:20px;}
#tela1 p {font-size:20px;font-weight:bold;text-align:center;}
#graficoPizza {width:300px;height:300px;margin:auto}
:root{--bg:#f4f6f9;--text:#000;--box:#fff;--primary:#3498db;}
.dark{--bg:#1e1e1e;--text:#ecf0f1;--box:#2c2c2c;--primary:#2980b9;}
body{font-family:Arial;margin:0;background:var(--bg);color:var(--text)}
h1{margin:0;background:#2c3e50;color:#fff;display:flex;justify-content:space-between;padding:10px 20px}
.container{display:none;padding:15px}
.container.active{display:block}
.box{background:var(--box);padding:15px;margin:10px 0;border-radius:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
th{background:var(--primary);color:#fff}
.menu{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:var(--box)}
.fab{position:fixed;bottom:80px;right:20px;background:var(--primary);color:#fff;border:none;border-radius:50%;width:60px;height:60px}
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center
}
.modal-content{
background:var(--box);
padding:20px;
border-radius:10px;
width:90%
}
.edit{background:#f1c40f}
.delete{background:#e74c3c;color:#fff}
#calTitulo{text-align:center;font-weight:bold;margin-bottom:10px;}
#calendario{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dia{padding:10px;border-radius:8px;font-size:12px;text-align:center;background:var(--box)}
.baixo{background:#2ecc71;color:#fff}
.medio{background:#f1c40f}
.alto{background:#e74c3c;color:#fff}

/* MODAL */
.modal-content{
width:95% !important;
max-width:500px !important;
padding:25px !important;
border-radius:15px !important;
display:flex;
flex-direction:column;
}
.modal-content select,
.modal-content input{
width:100% !important;
margin:10px 0 !important;
padding:14px !important;
font-size:16px !important;
border-radius:10px !important;
box-sizing:border-box;
}
.modal-content button{
width:100% !important;
margin-top:10px;
padding:14px !important;
font-size:16px !important;
border-radius:10px !important;
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
<div class="splash-box">
<div class="logo">💰</div>
<h1>Controle Financeiro</h1>
<p>Carregando...</p>
<div class="barra"></div>
</div>
</div>

<h1>
Controle Financeiro
<button onclick="toggleTema()">🌙</button>
</h1>

<div class="container active" id="tela1">
<h2 style="text-align:center;">🏠 Início Financeiro</h2>
<div class="box">
<p>📅 Selecione um mês</p>
<input type="month" id="filtroMes" onchange="render()">
<p id="alertaMes" style="color:red;display:none;">Escolha um mês</p>
</div>

<div class="box">
<h3>Receitas</h3>
<table id="tabelaReceitas"></table>
</div>

<div class="box">
<h3>Despesas</h3>
<table id="tabelaDespesas"></table>
</div>
</div>

<div class="container" id="tela2">
<h2 style="text-align:center;">📊 Resumo & Gráficos</h2>
<div class="box">
<h3>Resumo</h3>
<table id="tabelaResumo"></table>
</div>
<canvas id="graficoBarras"></canvas>
</div>

<div class="container" id="tela3">
<h2 style="text-align:center;">📅 Calendário & Gráficos</h2>
<div class="box">
<h3 id="calTitulo">Calendário</h3>
<div id="calendario"></div>
</div>
<div class="box">
<canvas id="graficoPizza"></canvas>
</div>
</div>

<div class="menu">
<button onclick="irParaTela(1)">🏠</button>
<button onclick="irParaTela(2)">📊</button>
<button onclick="irParaTela(3)">📈</button>
</div>

<button class="fab" onclick="abrirModal()">+</button>

<div class="modal" id="modal">
<div class="modal-content">
<select id="tipo" onchange="atualizarCategorias()"></select>
<select id="categoria"></select>
<input type="date" id="data">
<input type="number" id="valor">
<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>
</div>
</div>

<script>
window.addEventListener("load", () => {
setTimeout(()=>{
let splash = document.getElementById("splash");
if(splash){
splash.classList.add("fade-out");
setTimeout(()=>{splash.style.display="none";},800);
}
},2500);
});

let receitas=JSON.parse(localStorage.getItem("receitas"))||[];
let despesas=JSON.parse(localStorage.getItem("despesas"))||[];
let graficoBarras=null;
let graficoPizza=null;
let editando=null;

function toggleTema(){
document.body.classList.toggle("dark");
}

function atualizarCategorias(){
let tipo=document.getElementById("tipo").value;
let c=document.getElementById("categoria");
c.innerHTML="";
let lista=tipo==="receita"
?["Salário","Extra","Outros"]
:["Transporte","Alimentação","Internet","Água-Luz","Lazer","Cartão","Escola","Outros"];
lista.forEach(i=>{
let o=document.createElement("option");
o.value=i;
o.textContent=i;
c.appendChild(o);
});
}

function abrirModal(){
document.getElementById("modal").style.display="flex";
document.getElementById("tipo").innerHTML=
'<option value="receita">Receita</option><option value="despesa">Despesa</option>';
atualizarCategorias();
}

function fecharModal(){
document.getElementById("modal").style.display="none";
editando=null;
}

function salvar(){
let tipo=document.getElementById("tipo").value;
let data=document.getElementById("data").value;
let categoria=document.getElementById("categoria").value;
let valor=parseFloat(document.getElementById("valor").value);

if(!data || !categoria || !valor){
alert("Preencha tudo");
return;
}

let lista=tipo==="receita"?receitas:despesas;

if(editando){
let i=lista.findIndex(x=>x.id===editando);
lista[i]={id:editando,data,categoria,valor};
}else{
lista.push({id:Date.now(),data,categoria,valor});
}

localStorage.setItem("receitas",JSON.stringify(receitas));
localStorage.setItem("despesas",JSON.stringify(despesas));

fecharModal();
render();
}

function editar(id,tipo){
let lista=tipo==="receita"?receitas:despesas;
let item=lista.find(x=>x.id===id);

document.getElementById("tipo").value=tipo;
atualizarCategorias();
document.getElementById("data").value=item.data;
document.getElementById("categoria").value=item.categoria;
document.getElementById("valor").value=item.valor;

editando=id;
abrirModal();
}

function excluir(id,tipo){
if(!confirm("Excluir item?")) return;

let lista=tipo==="receita"?receitas:despesas;
let i=lista.findIndex(x=>x.id===id);
lista.splice(i,1);

localStorage.setItem("receitas",JSON.stringify(receitas));
localStorage.setItem("despesas",JSON.stringify(despesas));

render();
}

function calendario(){
let box=document.getElementById("calendario");
let titulo=document.getElementById("calTitulo");
box.innerHTML="";

let filtro=document.getElementById("filtroMes").value;
if(!filtro){
box.innerHTML="Selecione mês";
titulo.innerText="Calendário";
return;
}

let [ano,mes]=filtro.split("-");
let nomesMes=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
titulo.innerText = nomesMes[mes-1] + " " + ano;

let totalDias = new Date(ano, mes, 0).getDate();
let dias={};

despesas.forEach(d=>{
if(d.data.startsWith(filtro)){
let dia=parseInt(d.data.split("-")[2]);
dias[dia]=(dias[dia]||0)+d.valor;
}
});

for(let i=1;i<=totalDias;i++){
let v=dias[i]||0;
let div=document.createElement("div");
div.className="dia";

if(v>200) div.classList.add("alto");
else if(v>100) div.classList.add("medio");
else if(v>0) div.classList.add("baixo");

div.innerHTML=`${i}<br>${v?("R$ "+v.toFixed(2)):""}`;
box.appendChild(div);
}
}

function render(){
let filtro=document.getElementById("filtroMes").value;

document.getElementById("alertaMes").style.display = filtro ? "none":"block";

let tabR=document.getElementById("tabelaReceitas");
let tabD=document.getElementById("tabelaDespesas");
let tabResumo=document.getElementById("tabelaResumo");

tabR.innerHTML="<tr><th>Data</th><th>Valor</th><th>Ações</th></tr>";
tabD.innerHTML="<tr><th>Data</th><th>Categoria</th><th>Valor</th><th>Ações</th></tr>";

let resumo={};
let totalReceitas=0;
let totalDespesas=0;

receitas.forEach(r=>{
if(!filtro || r.data.startsWith(filtro)){
totalReceitas+=r.valor;

tabR.insertRow().innerHTML=
`<td>${r.data}</td>
<td>R$ ${r.valor.toFixed(2)}</td>
<td>
<button class="edit" onclick="editar(${r.id},'receita')">✏️</button>
<button class="delete" onclick="excluir(${r.id},'receita')">🗑️</button>
</td>`;
}
});

despesas.forEach(d=>{
if(!filtro || d.data.startsWith(filtro)){
totalDespesas+=d.valor;
resumo[d.categoria]=(resumo[d.categoria]||0)+d.valor;

tabD.insertRow().innerHTML=
`<td>${d.data}</td>
<td>${d.categoria}</td>
<td>R$ ${d.valor.toFixed(2)}</td>
<td>
<button class="edit" onclick="editar(${d.id},'despesa')">✏️</button>
<button class="delete" onclick="excluir(${d.id},'despesa')">🗑️</button>
</td>`;
}
});

let saldo = totalReceitas - totalDespesas;

tabResumo.innerHTML=`
<tr><th>Descrição</th><th>Valor</th></tr>
<tr><td>💰 Receitas</td><td style="color:green">R$ ${totalReceitas.toFixed(2)}</td></tr>
<tr><td>💸 Despesas</td><td style="color:red">R$ ${totalDespesas.toFixed(2)}</td></tr>
<tr><td>📊 Saldo</td>
<td style="color:${saldo>=0?'green':'red'}">
R$ ${saldo.toFixed(2)}
</td></tr>
`;

let labels=Object.keys(resumo);
let valores=Object.values(resumo);
let cores = labels.map(()=> '#'+Math.floor(Math.random()*16777215).toString(16));

if(window.chartReady){
try{
if(graficoBarras) graficoBarras.destroy();
graficoBarras=new Chart(document.getElementById("graficoBarras"),{
type:"bar",
data:{labels,datasets:[{data:valores,backgroundColor:cores}]}
});
}catch(e){}

try{
if(graficoPizza) graficoPizza.destroy();
graficoPizza=new Chart(document.getElementById("graficoPizza"),{
type:"pie",
data:{labels,datasets:[{data:valores,backgroundColor:cores}]}
});
}catch(e){}
}

calendario();
}

function irParaTela(n){
document.querySelectorAll(".container").forEach(c=>c.classList.remove("active"));
document.getElementById("tela"+n).classList.add("active");
render();
}

/* ✅ INICIALIZAÇÃO SEGURA */
function iniciarQuandoPronto(){
if(window.chartReady){
render();
}else{
setTimeout(iniciarQuandoPronto,100);
}
}

iniciarQuandoPronto();
</script>

</body>
</html>
