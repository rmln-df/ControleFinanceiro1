<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>CONTROLE FINANCEIRO</title>

<script>
window.chartReady = false;
(function(){
  var s = document.createElement("script");
  s.src = "chart.js";
  s.onload = function(){ window.chartReady = true; };
  s.onerror = function(){
    var cdn = document.createElement("script");
    cdn.src = "https://cdn.jsdelivr.net/npm/chart.js";
    cdn.onload = function(){ window.chartReady = true; };
    cdn.onerror = function(){ window.chartReady = true; };
    document.head.appendChild(cdn);
  };
  document.head.appendChild(s);
})();
</script>

<style>
:root{--bg:#f4f6f9;--text:#000;--box:#fff;--primary:#3498db;--success:#2ecc71;--danger:#e74c3c;}
.dark{--bg:#1e1e1e;--text:#ecf0f1;--box:#2c2c2c;--primary:#2980b9;}

body{font-family:Arial;margin:0;background:var(--bg);color:var(--text)}


/* Controle de swipe no calendário */
#tela3 {
    touch-action: pan-y;
}


/* Estilo do Modal e Campos */
.modal-content select,
.modal-content input {
    width: 100%;
    height: 50px;
    padding: 10px;
    margin: 8px 0;
    box-sizing: border-box;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}


/* Aumenta o quadro (a caixa branca) que envolve o mês */
#tela1 .box:first-of-type {
    padding: 20px;          /* Aumenta o espaço interno do quadro */
    margin-top: 20px;       /* Dá mais distância do título */
    border: 2px solid var(--primary); /* Adiciona uma borda colorida opcional */
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Dá um efeito de profundidade */
}

/* Garante que o texto dentro desse quadro também acompanhe o tamanho */
#tela1 .box:first-of-type p {
    font-size: 22px;        /* Aumenta o texto "Selecione um mês" */
    margin-bottom: 15px;
}



/* 🔥 BOTÕES SALVAR E CANCELAR (AUMENTADOS) */
.modal-content button {
    width: 100%;
    margin-top: 12px;
    padding: 20px;       /* Quadro bem grande para toque */
    font-size: 18px;     /* Letra maior */
    font-weight: bold;
    border-radius: 12px;
    border: none;
    cursor: pointer;
}

.btn-salvar { background-color: var(--success); color: white; }
.btn-cancelar { background-color: #95a5a6; color: white; }

/* Layout Geral */
#splash{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#3498db,#2c3e50);z-index:9999;}
.splash-box{text-align:center;color:#fff}
.logo{font-size:50px;animation:pulse 1.5s infinite}
.barra{width:200px;height:6px;background:rgba(255,255,255,0.3);margin:20px auto;border-radius:10px;overflow:hidden}
.barra::after{content:"";display:block;height:100%;width:0;background:#fff;animation:carregar 2.5s linear forwards}
@keyframes carregar{from{width:0}to{width:100%}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.fade-out{opacity:0;transition:.8s}

h1{margin:0;background:#2c3e50;color:#fff;display:flex;justify-content:space-between;padding:10px 20px}
.container{display:none;padding:15px; padding-bottom: 100px;}
.container.active{display:block}
.box{background:var(--box);padding:15px;margin:10px 0;border-radius:10px}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd; text-align: left;}
th{background:var(--primary);color:#fff}

.menu{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:var(--box); padding: 10px 0; border-top: 1px solid #ddd;}
.menu button {font-size:25px; background:none; border:none; color:var(--primary)}

.fab{position:fixed; top:80px; right:15px; background:var(--primary); color:#fff; border:none; border-radius:50%; width:60px; height:60px; font-size:30px; z-index:1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center; z-index: 2000;}
.modal-content{background:var(--box);padding:25px;border-radius:20px;width:90%;max-width:380px;display:flex;flex-direction:column;}
.modal-content label{font-weight:bold;margin-top:10px;}

.edit{background:#f1c40f; border:none; padding:5px; border-radius:5px;}
.delete{background:#e74c3c; color:#fff; border:none; padding:5px; border-radius:5px;}

#calTitulo{text-align:center;font-weight:bold;margin-bottom:10px;}
#calendario{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dia{padding:8px;border-radius:8px;font-size:11px;text-align:center;background:var(--box); border: 1px solid #eee;}
.baixo{background:#2ecc71;color:#fff}
.medio{background:#f1c40f}
.alto{background:#e74c3c;color:#fff}

#filtroMes { width: 90%; height: 50px; border-radius: 10px; border: 1px solid #ccc; padding: 5px 15px; font-size: 18px;}
</style>
</head>

<body>

<div id="splash">
    <div class="splash-box">
        <div class="logo">💰</div>
        <h1>Controle Financeiro</h1>
        <p>Carregando...</p>
        <div class="barra"></div>
    </div>
</div>

<h1>
    Controle Financeiro
    <button onclick="toggleTema()" style="background:none; border:none; font-size: 20px;">🌙</button>
</h1>

<div class="container active" id="tela1">
    <h2 style="text-align:center;">🏠 Início Financeiro</h2>
    <div class="box">
        <p>📅 Selecione um mês</p>
        <input type="month" id="filtroMes" onchange="render()">
        <p id="alertaMes" style="color:red;display:none; text-align:center;">Escolha um mês</p>
    </div>
    <div class="box">
        <h3>Receitas</h3>
        <table id="tabelaReceitas"></table>
    </div>
    <div class="box">
        <h3>Despesas</h3>
        <table id="tabelaDespesas"></table>
    </div>
</div>

<div class="container" id="tela2">
    <h2 style="text-align:center;">📊 Resumo & Gráfico</h2>
    <div class="box">
        <h3>Resumo</h3>
        <table id="tabelaResumo"></table>
    </div>
    <div class="box">
        <canvas id="graficoBarras"></canvas>
    </div>
</div>

<div class="container" id="tela3">
    <h2 style="text-align:center;">📅 Calendário & Gráfico</h2>
    <div class="box">
        <h3 id="calTitulo">Calendário</h3>
        <div id="calendario"></div>
    </div>
    <div class="box">
        <canvas id="graficoPizza"></canvas>
    </div>
</div>

<div class="menu">
    <button onclick="irParaTela(1)">🏠</button>
    <button onclick="irParaTela(2)">📊</button>
    <button onclick="irParaTela(3)">📅</button>
</div>

<button class="fab" onclick="abrirModal()">+</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <label>Tipo</label>
        <select id="tipo" onchange="atualizarCategorias()"></select>

        <label>Categoria</label>
        <select id="categoria"></select>

        <label>Data</label>
        <input type="date" id="data">

        <label>Valor</label>
        <input type="number" id="valor" placeholder="0.00">

        <button class="btn-salvar" onclick="salvar()">Salvar Registro</button>
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

window.addEventListener("load", () => {
    setTimeout(()=>{
        let splash = document.getElementById("splash");
        if(splash){
            splash.classList.add("fade-out");
            setTimeout(()=>{splash.style.display="none";},800);
        }
    },2000);
});

let receitas = JSON.parse(localStorage.getItem("receitas")) || [];
let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
let graficoBarras = null;
let graficoPizza = null;
let editando = null;

function formatarData(dataISO){
    if(!dataISO) return "";
    let [ano, mes, dia] = dataISO.split("-");
    return `${dia}/${mes}/${ano.slice(2)}`;
}

function toggleTema(){ document.body.classList.toggle("dark"); }

function atualizarCategorias(){
    let tipo = document.getElementById("tipo").value;
    let c = document.getElementById("categoria");
    c.innerHTML = "";
    let lista = tipo === "receita" 
        ? ["Salário", "Extra", "Outros"] 
        : ["Transporte", "Alimentação", "Internet", "Água-Luz", "Lazer", "Cartão", "Escola", "Outros"];
    lista.forEach(i => {
        let o = document.createElement("option");
        o.value = i; o.textContent = i;
        c.appendChild(o);
    });
}

function abrirModal(){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("tipo").innerHTML = '<option value="receita">Receita</option><option value="despesa">Despesa</option>';
    atualizarCategorias();
}

function fecharModal(){
    document.getElementById("modal").style.display = "none";
    editando = null;
    document.getElementById("valor").value = "";
}

function salvar(){
    let tipo = document.getElementById("tipo").value;
    let data = document.getElementById("data").value;
    let categoria = document.getElementById("categoria").value;
    let valor = parseFloat(document.getElementById("valor").value);

    if(!data || !categoria || !valor){ alert("Preencha todos os campos!"); return; }

    let lista = tipo === "receita" ? receitas : despesas;

    if(editando){
        let i = lista.findIndex(x => x.id === editando);
        lista[i] = {id: editando, data, categoria, valor};
    } else {
        lista.push({id: Date.now(), data, categoria, valor});
    }

    localStorage.setItem("receitas", JSON.stringify(receitas));
    localStorage.setItem("despesas", JSON.stringify(despesas));

    fecharModal();
    render();
}

function editar(id, tipo){
    let lista = tipo === "receita" ? receitas : despesas;
    let item = lista.find(x => x.id === id);
    abrirModal();
    document.getElementById("tipo").value = tipo;
    atualizarCategorias();
    document.getElementById("data").value = item.data;
    document.getElementById("categoria").value = item.categoria;
    document.getElementById("valor").value = item.valor;
    editando = id;
}

function excluir(id, tipo){
    if(!confirm("Deseja excluir este item?")) return;
    if(tipo === 'receita') {
        receitas = receitas.filter(x => x.id !== id);
        localStorage.setItem("receitas", JSON.stringify(receitas));
    } else {
        despesas = despesas.filter(x => x.id !== id);
        localStorage.setItem("despesas", JSON.stringify(despesas));
    }
    render();
}

function calendario(){
    let box = document.getElementById("calendario");
    let titulo = document.getElementById("calTitulo");
    box.innerHTML = "";
    let filtro = document.getElementById("filtroMes").value;
    if(!filtro) { box.innerHTML = "Selecione um mês"; return; }

    let [ano, mes] = filtro.split("-");
    let nomesMes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    titulo.innerText = nomesMes[parseInt(mes)-1] + " " + ano;

    let totalDias = new Date(ano, mes, 0).getDate();
    let diasGasto = {};

    despesas.forEach(d => {
        if(d.data.startsWith(filtro)){
            let dia = parseInt(d.data.split("-")[2]);
            diasGasto[dia] = (diasGasto[dia] || 0) + d.valor;
        }
    });

    for(let i=1; i<=totalDias; i++){
        let v = diasGasto[i] || 0;
        let div = document.createElement("div");
        div.className = "dia";
        if(v > 200) div.classList.add("alto");
        else if(v > 100) div.classList.add("medio");
        else if(v > 0) div.classList.add("baixo");
        div.innerHTML = `${i}<br>${v > 0 ? v.toFixed(0) : ""}`;
        box.appendChild(div);
    }
}

function irParaTela(n){
    document.querySelectorAll(".container").forEach(c => c.classList.remove("active"));
    document.getElementById("tela"+n).classList.add("active");
    render();
}

function render(){
    let filtro = document.getElementById("filtroMes").value;
    document.getElementById("alertaMes").style.display = filtro ? "none" : "block";

    let tabR = document.getElementById("tabelaReceitas");
    let tabD = document.getElementById("tabelaDespesas");
    let tabResumo = document.getElementById("tabelaResumo");

    tabR.innerHTML = "<tr><th>Data</th><th>Cat.</th><th>Valor</th><th>Ações</th></tr>";
    tabD.innerHTML = "<tr><th>Data</th><th>Cat.</th><th>Valor</th><th>Ações</th></tr>";

    let resumo = {}; let totalR = 0; let totalD = 0;

    receitas.forEach(r => {
        if(!filtro || r.data.startsWith(filtro)){
            totalR += r.valor;
            tabR.insertRow().innerHTML = `<td>${formatarData(r.data)}</td><td>${r.categoria}</td><td>R$${r.valor.toFixed(2)}</td><td><button class="edit" onclick="editar(${r.id},'receita')">✏️</button> <button class="delete" onclick="excluir(${r.id},'receita')">🗑️</button></td>`;
        }
    });

    despesas.forEach(d => {
        if(!filtro || d.data.startsWith(filtro)){
            totalD += d.valor;
            let cat = d.categoria || "Outros"; // Evita undefined
            resumo[cat] = (resumo[cat] || 0) + d.valor;
            tabD.insertRow().innerHTML = `<td>${formatarData(d.data)}</td><td>${cat}</td><td>R$${d.valor.toFixed(2)}</td><td><button class="edit" onclick="editar(${d.id},'despesa')">✏️</button> <button class="delete" onclick="excluir(${d.id},'despesa')">🗑️</button></td>`;
        }
    });

    let saldo = totalR - totalD;
    tabResumo.innerHTML = `<tr><td>Receitas</td><td style="color:green">R$ ${totalR.toFixed(2)}</td></tr><tr><td>Despesas</td><td style="color:red">R$ ${totalD.toFixed(2)}</td></tr><tr><td><b>Saldo</b></td><td style="color:${saldo>=0?'green':'red'}"><b>R$ ${saldo.toFixed(2)}</b></td></tr>`;

    // GRÁFICOS
    if(window.chartReady && typeof Chart !== "undefined"){
        let labels = Object.keys(resumo);
        let valores = Object.values(resumo);
        let cores = labels.map(() => '#' + Math.floor(Math.random()*16777215).toString(16));

        try {
            if(graficoBarras) graficoBarras.destroy();
            graficoBarras = new Chart(document.getElementById("graficoBarras"), {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Despesas', data: valores, backgroundColor: cores }] }
            });
            if(graficoPizza) graficoPizza.destroy();
            graficoPizza = new Chart(document.getElementById("graficoPizza"), {
                type: 'pie',
                data: { labels, datasets: [{ label: 'Despesas', data: valores, backgroundColor: cores }] }
            });
        } catch(e) { console.log("Erro gráfico:", e); }
    }
    calendario();
}

window.addEventListener("DOMContentLoaded", () => {
    let mesAtual = new Date().toISOString().slice(0, 7);
    document.getElementById("filtroMes").value = mesAtual;
    render();
});



// 👇 Swipe para trocar mês no calendário (tela 3)
(function(){
    let startX = 0;
    let endX = 0;

    const tela3 = document.getElementById("tela3");

    if(tela3){
        tela3.addEventListener("touchstart", function(e){
            startX = e.touches[0].clientX;
        });

        tela3.addEventListener("touchend", function(e){
            endX = e.changedTouches[0].clientX;
            handleSwipe();
        });
    }

    function handleSwipe(){
        let diff = endX - startX;

        // sensibilidade do gesto
        if(Math.abs(diff) < 50) return;

        let inputMes = document.getElementById("filtroMes");
        if(!inputMes.value) return;

        let [ano, mes] = inputMes.value.split("-");
        mes = parseInt(mes);

        if(diff > 0){
            // 👉 swipe direita = mês anterior
            mes--;
            if(mes < 1){
                mes = 12;
                ano--;
            }
        } else {
            // 👉 swipe esquerda = próximo mês
            mes++;
            if(mes > 12){
                mes = 1;
                ano++;
            }
        }

        let novoMes = `${ano}-${String(mes).padStart(2,'0')}`;
        inputMes.value = novoMes;

        render(); // atualiza tudo
    }
})();



</script>

</body>
</html>
